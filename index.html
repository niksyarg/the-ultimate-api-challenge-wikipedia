<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nikipedia | Your Knowledge Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-wrapper">
                <img src="https://upload.wikimedia.org/wikipedia/commons/6/63/Wikipedia-logo.png" alt="Wiki Logo" class="logo">
            </div>
            <h1>NIKIPEDIA</h1>
            <p class="tagline">The Free Encyclopedia, Reimagined.</p>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search for anything..." autofocus>
                <button id="searchButton">Search</button>
            </div>
        </header>

        <div id="loader" class="hidden">Exploring the archives...</div>

        <main id="resultsGrid" class="results-grid">
            </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
